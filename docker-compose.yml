services:
  mysql:
    image: mysql:8.0
    container_name: rg_receitas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: teste_receitas_rg_sistemas
      TZ: America/Sao_Paulo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rg_receitas_backend
    restart: unless-stopped
    environment:
      PORT: 3333
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: teste_receitas_rg_sistemas
      JWT_SECRET: docker_secret_change_me
    ports:
      - "3333:3333"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: